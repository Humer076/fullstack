services:
  - type: web
    name: skillbridge-backend
    env: node
    rootDir: skillbridge-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: '3001'
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
